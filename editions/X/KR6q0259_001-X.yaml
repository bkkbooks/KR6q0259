body:
  text: 中都大萬壽禪寺辯和尚問唐慈雲十身禪寺覺和尚答燕京報恩禪寺林泉老人頌華亭生生道人梓問聲前薦得落在今時句後承當迷頭認影作麼生是空劫已前自己答半夜石人無影像縱橫誰辨往來源頌大地山河瑞像全丙丁求火又重宣紅鑪點雪非情謂碧岫滄浪絕妙玄緣木取魚終錯矣刻舟求劒必徒然驊騮一自窺鞭影忍俊追風過九天問虗空問萬象萬象答虗空且道甚麼人證據答六耳不同謀頌萬象虗空不惜眉分明問答報君知須彌俛首非全諾還似踈山半肯時參飽客莫狐疑休待文殊下一椎問暫時不在如同死人且道在甚麼處答東西南北頌毫忽之差紅塵汩沒至理一言奪胎換骨知不知休恍惚夜來兔角逞神通擊碎多年山鬼窟問門裏出身易身裏出門難如何是身裏出門底人答呂大后頌覿面分明仔細看風流禪客莫顢頇箇中本自無難易剛被時人立易難問從天降下則貧寒從地湧出則富貴既是從天降下為甚麼却貧寒答甲乙丙丁頌貧富須知祇在人乾坤那更有踈親隨家豐儉元平等獘服華房各任真問盡大地是箇解脫門把手拽不入且道過在師過在學人答子承父業頌推不出拽不入解脫門開無處立師資過犯總彌天悔也應知追不及追不及入水還曾脚不濕問山河大地無纖毫過患猶是轉身句且道轉了後如何答舌頭在口裏頌拽尾靈龜擬忘其迹其迹弗忘翻成勞役萬丈懸崖撒手時脚跟點地無移易無移易昨夜東風滿四維曉來頓覺花狼藉問不見一法猶是半提作麼生是全提底道理答石馬驟千山頌陝府鐵牛赤骨立芒繩掣斷應難覔崑崙山上震雷音大似一聲春霹靂水草之餘無所知却來江岸聽羗笛問靈山四十九年未甞道著一字少室九年面壁行行分明還信得及麼答文不加點頌談而不談聽而不聽玉潔氷清星衡藻鏡全諾兮辜負己靈半肯兮埋沒先聖明眼禪和仔細參莫隨狂解招三病問䟦難陀龍王無耳善聽且道是甚麼人為他說答張三李四頌舜若多神失却口䟦難陁龍居其右再三再四乞玄言不免為渠垂隻手問以泥洗泥即不問以水洗水時若何答黃河入海流頌水洗水法幢高建超前軌可怜一片老婆心漏泄玄關親切旨祇這是活句休同死句參鷓鴣啼在深花裏問喫飯忘其飢力充忘其飽作麼生是力充底人答巨靈擡手無多子分破華山千萬重頌跛挈痿羸軟弱儂徧身紅爛臥荊叢眉棱擬舉如山重我道斯人力最充問一透龍門雲外路莫作黃河點額魚未審龍門在甚麼處答洪波浩渺白浪滔天頌目斷平林與翠岑千巖萬壑曉雲深雷驚三級桃花浪葛杖陶梭俊不禁高著眼莫麤心此回蹉過實難尋問打破大唐國覓箇不會佛法底人不得設使覔得堪作何用答觀音妙智力能救世間苦頌量材受職是得非得迥出規模高超繩墨大唐國內尋將來且教屋裏閑噇食問三千大千界無剎不現身為甚麼十方遊歷徧不見佛行蹤答此去西天十萬里頌普眼當時覔普賢目睛猶若隱雲烟方知覿面相逢處好本元來天下傳問二邊純莫立中道不須安且道甚麼處相見得箇端的答鼻孔大頭垂頌佛殿行廊兩夾間不妨稽首拜師顏德雲面目周沙界莫訝別峰絕仰攀問有口讚不盡無言心自明是則裂破虗空不是則鬼家活計上人端的處道將一句來答不道不道頌鳧短鶴長松直棘曲李白桃紅山青水綠與麼酬酢千足萬足禪房一枕黑甜餘方信無由容寵辱問古人道一切不為佛也不作未審作箇甚麼答闡提漢頌古洞雲深下脚難轉身獨步入長安五湖四海皆曾到八水三川已徧觀有意氣時添意氣得盤桓處且盤桓聖情凡解俱截斷蠅利蝸名總不干問迴途轉位直須戴角披毛喚作畜生得麼答飢飡渴飲頌兀兀無知水牯牛優游終不混常流拖犁拽杷閑終日未審何時是徹頭逼拶處莫輕酬溈山書字深深意浩浩名聞四百州問若見諸相非相則見如來汝一切時中甚麼處歸依答心不負人頌眼中撥盡黃金屑調御十身猶屈節不識人嫌強露顏那堪仰嶠還饒舌橫按鏌鎁傷龜恕鱉幾箇禪流皮下有血問維摩一默未出化門目擊道存顢頇佛性洒落一句作麼生道答六六三十六頌跳出離微語默關橫身物外任安閑從他杓柄談長短但看山尖月一彎洒落句本非慳恐隨流水到人間問我是他非他是我非唯之與阿相去幾何答海闊山遙頌是非海裏安身得失林中著脚這般一等禪和不妨有些作略擬詢相去幾何別日為渠斟酌問闍王殺父圓悟無生善星出家為甚麼生陷地獄答據欵結案頌愛惡俱忘聖凡截斷地獄天堂猶窺葦管迷悟情塵不立時自然心地常平坦問路逢達道人不將語默對且道如何見得淺和深答賤避貴少避老頌携手相將過海東淺深難昧把梢翁鷓鴣聲裏桃花綻誰効靈雲繼祖風問作是思惟時十方佛皆現而今思惟也佛在甚麼處答頂上無螺髻頌揑目生華迷頭認影淨地撒沙平田掘井根境識三不勞馳騁妙相本自圓成莫學胭脂塗癭問若人識得心大地無寸土即今山河大地是有是無答江南塞北頌有無俱坐斷獨露一山河人境元非二心塵不隔多但能高著眼何用動干戈擊碎疑團還罄快莫教平地起風波問背覺合塵即不問背塵合覺是若何答劈腹剜心頌塵寰終日竟忙忙那事元來總不妨舉步儻能離向背更無岐路泣亡羊問未達境唯心起種種分別達境唯心已分別即不生過關底道將一句來答柳綠花紅頌懵憧無知總不記得一鏃遼空萬機頓息文殊不二門維摩酬一默牢看向上關照顧白拈賊走徧江南并塞北問少林九年垂一則語直至如今諸方詀舉未審諸人作麼生舉答徒勞側耳頌退步應須自決莫便亡鋒結舌若也莽鹵顢頇虧殺神光立雪別別勿謂達磨無法可說自是闍黎弄巧成拙問不用揚眉瞬目竪拂敲牀勿涉離微甚處相見答氣急殺人頌大地非寬微塵非窄覿面相呈撞頭磕額擬議不知攔腮便摑全提正令摠權衡萬里清風帀地生問水鳥樹林皆悉念佛念法且道案山與主山說箇甚麼法答諦聽諦聽頌切忌追求徒勞採摭竺法蘭陁未甞翻譯諦聽諦聽兮不辨金鍮如是如是兮難分玉石越凡情絕朕迹十寸應知為一尺問四十九年無不盡為甚麼末後拈花始道傳答怜兒不覺醜頌瞿曇平昔忒多羅鋪席開張不柰何末後拈花折倒處洎乎笑殺老頭陁阿呵呵會也麼幾縷斷霞橫雪嶽一鈎殘月挂烟蘿問絲懸綠水浮定有無之意且道為人在甚麼處答移舟諳水勢頌微風信止浪痕平短棹飄飄一葉輕月鈎雲餌沉寒水釣得金鱗始稱情參禪客參禪客莫待龍門遭點額問雲從龍風從虎且道仰山拄杖從箇甚麼答一棒一條痕頌雲從龍風從虎仰山柱杖從雷雨佛祖瞻之喪膽魂德山見也忘區宇杜禪和休莽鹵若非收得返魂香爭散來撾塗毒皷問直得不恁麼來者猶是兒孫事如何是向上人答半夜烏鷄雪裏啼頌瑞靄祥煙起鳳城玉樓金殿月華明祇聞闔國傳皇化到了終須不得名問情生智隔從來事息念忘緣又落空如何得相應去答珍重頌擊碎疑團便好休何須又被有無收欲令於是明真意雲自高飛水自流問牛頭橫說竪說不知有向上關捩子如何是向上關捩子答踏著便轉頌一撥靈機活鱍鱍三賢十聖應難奪箇中關捩少人知不必尋行緣本末大用神通變化時虎頭虎尾同時捋莫啾啾休聒聒德山棒兮臨濟喝問行玄體妙落在今時究理窮源關山萬里祇如未知有底人如何趣向答牀窄先臥頌瘖瘂盲聾踈狂愚魯百無所能一無可取是人多幸得如斯鼠糞休將投鼎釜問菩薩護生猶戒草木為甚麼南泉一刀兩段答不妨疑著頌斬猫芟蛇大人境界不解玄微翻為揑怪拍盲禪客細參詳妙用縱橫看變態問念念釋迦出世步步彌勒下生為甚麼擬心即錯動念即乖答自倒自起頌現在釋迦未來彌勒今古恒存何甞隱匿擬心動念轉迂迴為報禪流休費力出是非超語默人間幾箇知恩德問未離兜率已降王宮未出母胎度人已畢是如何答枉費草鞋錢頌耆闍山裏老瞿曇不惜眉毛為指南未出未離俱鈍滯垛根禪客切須參問龍吟霧起虎嘯風生且道是甚麼人分上事答玄沙元是謝三郎頌虎嘯龍吟風清霧黑不辨東西難分南北大悲千手運神通擘破面門猶不識何不識黯黯乾坤如潑墨問指南一路智者知踈瑞草無根為甚麼賢者不貴答好事不如無頌不貴知踈俊哉奇偉具眼阿師人間幾幾掣開金鎻碎玄關騎虎頭兮捋虎尾問三十年前尋劒客為甚麼一見桃花更不疑答眼在面門前頌已悟桃花樂有餘玄沙未保意何如靈苗瑞草從滋茂野父終須不肯鋤問鐘鳴鼓響無非觀音入理之門栢短松長盡是毗盧一真境界且如德山臨濟是甚麼家風答兩脚踏地頌咄棒頭突出冲霄鶻天眼龍睛不可窺轉身返入蒼龍窟雄雄七事用無窮大辨從來還若訥問依經解義數比河沙續焰聯芳稻麻竹葦祇如佛祖未生前還有佛法也無答洎合恁麼去頌佛法有釋迦老子徒開口佛法無達磨尊者漫勞軀五湖雲水休狂解粥罷應須洗鉢盂逆耳忠言如不信鐵圍山裏問文殊問動容揚古路不墮悄然機且道那箇有分那箇無分答有功者賞頌片雲為雨下山頭潤濕群萌徧九州一槩齊平無向背榮枯何用苦搜求問迷時千卷少悟後一言多且道悟了底人如何履踐答行不出戶坐不當堂頌迷悟端如眼裏塵衲僧一見便傷神要知履踐明白處社飲村歌樂本真問諸行無常是生滅法生滅滅已寂滅為樂恁麼會得還徹也未答此義文長頌徹與不徹總未勦絕曲為今時證龜作鱉踏徧叢林問徧人了然無地容生滅生滅求兮畢竟無可怜特地捨全軀得聞半偈雖忘楚爭免人言不丈夫問古人講得天花墜石點頭因甚重來訪祖師答碧眼胡僧笑點頭頌事窮理變計多端䟽鈔焚燒許德山一見龍潭成正覺不妨袖手伴雲閑問山河無隔礙圓明離識情如何領會答圓同太虗無欠無餘頌識情隔礙兩無端領會應知下口難般若談空空不有常啼何必賣心肝問城東老母與佛同生而不欲見佛且道這婆子還有長處也無答夜深方見把針人頌公案渾成見也麼擬詢長短不知他衲僧鼻孔人難摸獨許城東強老婆問世尊臨般涅槃時曼殊大士請佛再轉法輪世尊咄云吾四十九年未甞道著一字且如三乘十二分教自何而得答如是我聞頌靈鷲祖翁拘尸羅滅原始要終無法可說五教三乘謾度量龍宮海藏空羅列空羅列兮因何得千眼大悲也不識休不識憨皮袋是真彌勒問富樓那問佛清淨本然云何忽生山河大地莫道富樓那且如瞿曇還知痛痒麼答將此身心奉塵剎是則名為報佛恩頌山河大地元清淨猶向瞿曇求畢竟多少玄關僻執人紅塵堆裏迷真性問善財童子至妙高峰七日覔德雲比丘不得後別峰相見且道是德雲否答相識滿天下知心有幾人頌是不是妙高峯頂難行履具眼禪人仔細參正偏兼到非離此問岸如欲止先停棹車若不行須打牛如今打牛也車行也未答下載清風付與誰頌好箇溈山水牯牛群靈般運了無休方知羊鹿閑家具古佛場中不肯收行也未為君酬過後如何曾借問他云平地兩條溝問了了常知故言之不可及為甚麼洪音震地聵者不聞答穿過髑髏頌箇中若會不聞聞曉了觀音第一門眼睫眉毛俱解聽何勞洪韻震乾坤問釣盡江波金鱗始遇且道甚麼處相見答負命者上鈎頌離却磻溪與華亭不從鈎線得長鯨煙波萬頃乘清興肯學空舟載月明問為一大事因緣故出現於世如何是一大因緣答止止不須說頌大事因緣群心仰慕東土西天徒勞指注玉兔懷胎兮深隱紫微崑崙舉步兮高超雲露問二祖禮拜了依位而立初祖云汝得吾髓且道祖師還道盡也未答却請和尚道頌三拜畢依位立便云得髓令承襲兩桂芬芳直至今五花爛熳盈都邑端的處未為難盡不盡兮君自看問夜半正明天曉不露為甚麼道黑白未分前猶是正中偏答石女畫娥眉頌空劫威音外壺天不夜時嶺頭雲吐月海內島銜曦半暗半明唯半露無私照燭不萌枝問不披毛不戴角異類迴途事若何答十字街頭頌露地白牛角不全轉身獨步下層巔饑飡渴飲無餘事月一風前骨侖眠問一言道斷處千古意分明為甚麼高峰頂上有一人不肯在答長安雖樂頌千古雖非在一言斯人不肯更無端高峰頂上猶閑管足見居塵量不寬問白鷺下田千點雪黃鶯上樹一枝花且道是境不是答鳥銜花落碧巖前頌不貴語親秪圖眼正妍醜高低難謾寶鏡法燈擬議已輸機今日禪流看性命問寒山逢拾得拍手笑呵呵未審笑箇甚麼答飢嗔飽喜頌寒山拾得笑呵呵目擊心存會也麼此意分明非委曲更休特地覓誵訛問賓中辨主即不問主中之主事何如答觀音頂上彌陀佛頌主中主玉宇天顏棲紫府丹墀月浸影沉沉彩雲無限遮廊廡信不通音亦絕底事分明誰敢說問唯此一事實餘二即非真如何是真實底事答踏著秤鎚硬似鐵頌三脚蜘蛛飛上天徧參先聖與先賢忽然撞著須彌柱倒跨崑崙駕鐵船問達磨逢梁武摩騰遇漢明是則不隔纖毫不是則兩重公案上人參學眼在甚麼處答日裏看山頌宗教分梁漢佳聲震玉京是非從此出得失自茲生雨過山添翠雲開目倍明空花元不有何必怪雙睛問猿抱子歸青嶂後鳥銜花落碧巖前且道是甚麼人語答言不該典非君子之所談頌至理一言不勞分棟輸他夾山疑殺法眼錯商量有何眼莫學徐六空擔板問研窮至理以悟為則為甚麼祖師道不怕迷祇怕悟答跣足履春氷頌迷也何憂悟也何怕水月空花從他變化吹毛照雪倚天寒殺活權衡獨柄霸問有語不得道無言鬼也嗔且道意旨如何答舌頭無骨頌巖松庭檜影蕭條呌月玄猿恨未消清韻連霄酬谷響癡心猶自笑鷦鷯問有佛處不得住無佛處急走過且道衲僧家甚麼處安身立命答緊俏草鞋頌瘦笻挑月入紅塵不必擇居卜立身有佛處同無佛處趙州何用苦勞神問祖師道見處不從眼見聞處不從耳聞靈雲香嚴正眼在甚麼處答眉毛下頌聞似不聞見如不見木竹桃花乾坤普徧心中雙眼頓圓明六一俱亡無不見閃電光中仔細時何勞耳目生疲倦問斷絃續不得為甚麼千古響泠泠答罕遇知音頌我道知音一箇無知音縱有待何如乾闥婆奏頭陀舞習氣元來果未除問圓明了知不因心念未審從甚麼處念答分明記取頌覺照圓明絕念時更無一物可堪為四臣喝退忘依所雲倚西山月落遲問雖得六銷猶未忘一忘一之後功歸何所答冬去寒食一百五頌荒陂獵犬趂羚羊蹤跡無餘得校量畢竟元勳成底事茙葵傾側奉朝陽問色見聲求俱是妄問君那箇是如來答明眼人難謾頌乾屎橛雲門指出靈山月一道光含四百州癡兒何必重相謁色見聲求不契時達磨半夜辭梁闕問悟則言言般若迷時句句瘡疣為甚麼祖師道悟之一字直須吐却答心空及第歸頌吐不出嚥不入迷悟情懷誰敢立智炬煌煌照大千白毫光裏絕階級問情忘識盡歸真諦為甚麼絕點純清階下人答祇見錐頭利頌白珪無玷不足為貴圓珠不穴何可言純相如有智兮還成鈍滯罔象無心兮孰為因循豈知李杜蘇黃輩花酒叢中飽看春問自心起信還信自心且道信後如何行履答運水般柴頌河裏失錢河裏摝不須更買孫賓卜忽然獲得便流通頃刻徧達諸耳目耳目達無阻隔縱橫妙用賷商客問坐脫立亡猶未徹石霜消息事如何答蒼天蒼天頌枯木花開冷灰豆𪹼石霜一宗幾乎寂寞侍者忒慣叢林首座未甞行脚東風忽尔徧坤維點檢人間錯不錯遍地桃花紅灼灼問祖師道知有底人直須向異類中行祇如不知有底人向甚麼處行履答花襯馬蹄香頌忽憶南泉水牯牛溪頭溪尾自優游牧童睡穩芒繩斷明月孤圓萬里秋問古人道若論此事直須似鏡常明為甚麼道打破鏡來與汝相見答醜婦揚眉頌成壞根源不可疑休從照膽定良規本來面目常相見何用區區手撥眉問離心意識參出凡聖路學祇如到這裏參見阿誰學箇甚麼答相識還如不相識頌飢時喫飯寒時著衣無法可說無師可依震威一喝聾三日𭣟瞎雙睛息萬機問不落因果墮野狐身不昧因果脫野狐身且道落昧二字是同是別答春蘭秋菊頌通身徧身何必不必具眼阿師試分得失雷同兮採花成蜜無別兮割汁為漆實實雨過寒蟬鳴唧唧問絕後重甦方始欺君不得作麼生是重甦底人答作麼作麼頌名遂功成撒手行迴途復妙幾人能退身三步參詳去不會休爭鬼眼精問脫却籠頭卸角䭾底人向甚麼處安排答可上可下頌明窓靜几莫厭蕭疎籠頭角䭾不索驅除妥妥帖帖無欠無餘橫眠側臥一任卷舒問祖師道一念迴機便同本得迴機一句作麼生道答更無一物献尊堂頌休云迦葉富莫訝釋迦慳月逐波沉海雲隨鴈過山不居生死宅那住有無關若昧迴機路難逃作野犴問葉落歸根來時無口未審祖師那裏得這箇消息來答無言童子暗嗟吁頌霜天雲際沒賓鴻風捲平林萬樹空向晚凭樓閑放目難將有限趂無窮問古人云有道者得無心者通為甚麼道無心猶隔一重關答彈指三下頌𠘶泰興衰情忘轉隔得返紅衢還迷紫陌脚跟線斷了無拘方信名為雲水客問古人道修證則不無染汙則不可作麼生喚作染汙答含血噀人頌萬里晴空片雲點破一翳不生九鳥自墮除去見聞覺知併却行住坐臥氷清玉潔總如如莫道精嚴無一箇問不用求真唯須息見祇如諸見如何息得答眼裏無筋一世貧頌諸見息平田未免生荊棘荊棘林中得自由方能透得黃金國箇中真妄本無殊為報禪人休費力問古人道有一人常不喫飯不道飢有一人終日喫飯不道飽且道是一人是二人答難兄難弟頌飢不飢飽不飽無欠無餘非善巧鼻孔昂藏模𢱢難謾云壯若雙垂瓜是一人是二人屈指從頭數不真問得魚必假筌得兔必假不假筌還得也無答收來放去頌恢恢天網疎非漏水陸生靈難以透點額華鯨更不移桂宮白兔仍依舊遇明時當曉晝呂尚從今莫下鈎成湯自此休秋狩問德山棒如雨點臨濟喝似雷奔且道那箇最親切答南地竹兮北地木頌拱密威嚴全施號令無劣無優無偏無正具眼兮針芥相投擬心兮聖凡難並當機棒喝沒人情十聖三賢應乞命問百尺竿頭須進步十方世界現全身且道百尺竿頭如何進步答險頌踢倒須彌踏翻大地左右逢源縱橫無累分身百億兮至化綿綿撒手懸厓兮靈機異異問情存向背見處偏枯且道仰山拂子是偏是正答信手拈來頌玉線金針半夜穿鼻微芒細巧相聯從來妙用離情見須信靈山有秘傳問曹山云諸方盡把格則語何不與他道却且道如何為他道則是答逢人不得錯舉頌法不離心波即是水擬涉詮量是非鋒起古格分明舉似伊桃紅李白薔薇紫問龍牙云待石烏龜解語即向汝道且道那箇是石烏龜答九宮八卦頌石烏龜分付汝劈腹剜心無險阻茫茫天下杜禪和慎勿從今休錯舉問德山云我宗無語句實無一法與人且道德山還盡善也未答駟不及舌頌雲出岫兮無心月印江兮非意直饒雲月如然也是一場特地舉身踏轉上頭關應笑維摩垂不二鷲嶺舉一花少林開五葉西乾布芬芳東土光煒煠五派各奔流一言成勝捷正偏能參差祖代相承接玉馬驟青霄泥牛駕舟檝蒼梧鳳不棲古殿誰肯躡撒手舊途中主賓那交涉肚飽枕高安帖帖綠水綠潺潺青山青疊疊
