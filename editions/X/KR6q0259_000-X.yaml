body:
  text: 青州百問序夫禪分五派本乎出自一源教列三乘大底終歸一法利生接物若洪鐘隨扣而騰聲遇緣即宗猶大鑑對形而現影是以高低普應妍醜齊分須令入聖超凡必使識心見性恭惟青州法祖大師提綱振領鼎新曹洞之宗運智興悲彌䨱兒孫之𭼭師一日厭居京邑退隱山林聚十方僧束三條篾每向室中勘驗皆明格外良規用一對無孔竅鉗鎚出百隻沒意頭符券三世諸佛未免再鑄同函鑰匙六代祖師更須重經大冶鑪鞴言言有據字字無虗爍破瞎衲子眼睛扭轉杜禪和鼻孔偏圓互換玉線金針不易穿主伴交參銀山鐵壁應難透或奪或縱或放或收或立一塵或隳大地盖忽忽出自心上皆一一置作問端雖聞流布未甚光揚往往叢林不知名者多矣憧憧籌室透斯語者鮮焉既弗讓天衣晦堂圓通底蘊之奇可盥手焚香再拜薰毫而為之頌噫知我罪我其惟此書乎林泉野衲從倫序
